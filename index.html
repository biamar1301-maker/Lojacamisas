<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOJA CAMISAS</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Loja Camisas</h1>
        <nav>
            <ul>
                <li><a href="#shop">Shop</a></li>
                <li><a href="#cart">Cart</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="shop">
            <h2>Our Shirts</h2>
            <div class="shirt">
                <h3>Shirt 1</h3>
                <img src="shirt1.jpg" alt="Shirt 1">
                <label for="size1">Size:</label>
                <select id="size1">
                    <option value="S">S</option>
                    <option value="M">M</option>
                    <option value="L">L</option>
                    <option value="XL">XL</option>
                </select>
                <label for="quantity1">Quantity:</label>
                <input type="number" id="quantity1" min="1" value="1">
                <button onclick="addToCart('Shirt 1', 'size1', 'quantity1')">Add to Cart</button>
            </div>
            <div class="shirt">
                <h3>Shirt 2</h3>
                <img src="shirt2.jpg" alt="Shirt 2">
                <label for="size2">Size:</label>
                <select id="size2">
                    <option value="S">S</option>
                    <option value="M">M</option>
                    <option value="L">L</option>
                    <option value="XL">XL</option>
                </select>
                <label for="quantity2">Quantity:</label>
                <input type="number" id="quantity2" min="1" value="1">
                <button onclick="addToCart('Shirt 2', 'size2', 'quantity2')">Add to Cart</button>
            </div>
        </section>

        <section id="cart">
            <h2>Your Cart</h2>
            <ul id="cart-items"></ul>
            <button onclick="checkout()">Checkout</button>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Loja Camisas. All rights reserved.</p>
    </footer>
</body>
</html>

<script>
    let cart = [];

    function addToCart(shirtName, sizeId, quantityId) {
        const size = document.getElementById(sizeId).value;
        const quantity = document.getElementById(quantityId).value;
        cart.push({ name: shirtName, size: size, quantity: quantity });
        updateCartDisplay();
    }

    function updateCartDisplay() {
        const cartItems = document.getElementById('cart-items');
        cartItems.innerHTML = '';
        cart.forEach(item => {
            const li = document.createElement('li');
            li.textContent = `${item.name} - Size: ${item.size}, Quantity: ${item.quantity}`;
            cartItems.appendChild(li);
        });
    }

    function checkout() {
        alert('Proceeding to checkout');
        // Add checkout logic here
    }
</script>
